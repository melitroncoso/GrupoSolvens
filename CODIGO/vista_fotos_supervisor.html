<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Solvens - Evidencia Supervisor</title>
    <link rel="icon" href="../IMG/logo2.jpg" type="image/jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/filtros.css">
    <link rel="stylesheet" href="style/vista_fotos.css">
    <link rel="stylesheet" href="style/inicio.css">
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>

<body>

    <header class="header">
        <div class="header-left">
            <a href="inicioSupervisor.html" class="btn-volver" title="Volver al inicio">
                <i class="fas fa-arrow-left"></i>
            </a>
            <button class="btn-toggle-sidebar" id="btnToggleSidebar">
                <i class="fas fa-filter"></i>
                <span>Filtros</span>
            </button>
            <button id="btnExportarPPTX" class="btn-pptx btn-toggle-fotos" title="Generar reporte PowerPoint">
                <i class="fas fa-file-powerpoint"></i>
                <span>Exportar PPTX</span>
            </button>
        </div>
        <div class="header-center">
            <img src="../IMG/logo.png" alt="Logo Grupo Solvens" class="logo-nav">
        </div>
        <div class="header-right header-right-flex">
            <a href="login.html" class="btn-salir">Cerrar Sesión</a>
        </div>
    </header>

    <main class="contenido">
        <h1>Evidencia <span>Fotográfica</span></h1>
        <p class="page-subtitulo">Registro visual de visitas aprobadas — zona asignada</p>

        <div class="contenedor-layout">
            <aside class="sidebar-filtros" id="sidebarFiltros">
                <div class="sidebar-header">
                    <h2 class="titulo-filtros">Filtros</h2>
                    <button class="btn-cerrar-sidebar" id="btnCerrarSidebar"><i class="fas fa-times"></i></button>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Periodo</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione un rango de fechas:</p>
                        <div class="rango-fechas">
                            <div><label class="label-pequeno">Desde:</label><input type="date" class="input-fecha" id="fechaDesde"></div>
                            <div><label class="label-pequeno">Hasta:</label><input type="date" class="input-fecha" id="fechaHasta"></div>
                        </div>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Cliente</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione el cliente:</p>
                        <select class="select-filtro" id="filtroCliente">
                            <option value="">Todos</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Cadena</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la cadena:</p>
                        <select class="select-filtro" id="filtroCadena">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Sucursal</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la sucursal:</p>
                        <select class="select-filtro" id="filtroSucursal">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Zona</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la zona:</p>
                        <select class="select-filtro" id="filtroZona">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Canal</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione el canal:</p>
                        <select class="select-filtro" id="filtroCanal">
                            <option value="">Todos</option>
                        </select>
                    </div>
                </div>

                <div class="botones-filtro botones-filtro-row">
                    <button id="btnAplicarFiltros" class="btn-aplicar-filtros">Aplicar</button>
                    <button id="btnLimpiarFiltros" class="btn-limpiar-filtros">Limpiar</button>
                </div>
            </aside>

            <div id="contenedorVisitas" class="contenedor-visitas-full"></div>
        </div>
    </main>

    <div class="nav-container" id="navVisitas" style="display: none;">
        <button class="btn-nav-visita" id="prevVisita" title="Visita Anterior">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="btn-nav-visita" id="nextVisita" title="Siguiente Visita">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <footer class="footer-contacto">
        <p>
            <i class="fa-solid fa-envelope"></i>
            <a href="mailto:NRossi@gruposolvens.com.ar" style="color:#aaaaaa;text-decoration:none;">NRossi@gruposolvens.com.ar</a>
            | <i class="fa-solid fa-phone"></i> +54 11 6142-0293
        </p>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-prev" id="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
        <button class="lightbox-next" id="lightbox-next"><i class="fas fa-chevron-right"></i></button>
        <div class="lightbox-controls">
            <button class="btn-control" id="lightbox-download"><i class="fas fa-download"></i></button>
            <button class="btn-control" id="lightbox-close"><i class="fas fa-times"></i></button>
        </div>
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
        <div class="lightbox-info">
            <div id="lightbox-info-content" style="display:contents;"></div>
            <button class="btn-control-inline" id="lightbox-rotate"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <script>
        const URL_BASE = '/api';
        let visitasData = [];
        let filteredVisitas = [];
        let visitaIndex = 0;
        let currentImg = 0;

        async function cargarVisitas() {
            const idSupervisor = localStorage.getItem('id_usuario');
            if (!idSupervisor) { window.location.href = 'login.html'; return; }

            const res = await fetch(`${URL_BASE}/imagenes-supervisor?id_supervisor=${idSupervisor}`);
            if (!res.ok) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>Error al obtener las imágenes.</p>';
                return;
            }
            visitasData = await res.json();
            visitasData.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            if (visitasData.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay imágenes aprobadas para tu zona.</p>';
                return;
            }
            populateFilters();
            clearFilters();
        }

        function renderVisita(idx) {
            const v = filteredVisitas[idx];
            const cont = document.getElementById('contenedorVisitas');
            const imgsHtml = v.imagenes.map((img, i) => `
                <div class="foto-card" onclick="openLightbox(${i})">
                    <div class="foto-wrapper">
                        <img src="${img.ruta}" alt="Foto ${i + 1}" data-rotation="0" class="img-preview">
                    </div>
                    <button class="btn-rotar-gallery" onclick="rotarImagenGaleria(this, event)" title="Rotar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>`).join('');

            cont.innerHTML = `
                <div class="visita-seccion">
                    <div class="visita-header">
                        <h1>${v.cadena}</h1>
                        <div class="sub">
                            <i class="fas fa-user"></i> ${v.cliente || ''} &nbsp;|&nbsp;
                            <i class="fas fa-map-marker-alt"></i> ${v.sucursal} - ${v.localidad} |
                            <i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}
                        </div>
                    </div>
                    <div class="galeria-grid">${imgsHtml}</div>
                </div>`;

            const nav = document.getElementById('navVisitas');
            if (nav) nav.style.display = filteredVisitas.length > 1 ? 'flex' : 'none';
        }

        function rotarImagenGaleria(btn, e) {
            e.stopPropagation();
            const img = btn.parentElement.querySelector('img');
            let rot = (parseInt(img.getAttribute('data-rotation')) + 90) % 360;
            img.setAttribute('data-rotation', rot);
            img.style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
        }

        function populateFilters() {
            const makeOptions = items => [...new Set(items)].filter(Boolean).map(x => `<option value="${x}">${x}</option>`).join('');
            const llenar = (id, opciones, titulo) => {
                document.getElementById(id).innerHTML = `<option value="">${titulo}</option>` + opciones;
            };
            llenar('filtroCliente',  makeOptions(visitasData.map(v => v.cliente)),  'Cliente (todos)');
            llenar('filtroCadena',   makeOptions(visitasData.map(v => v.cadena)),   'Cadena (todas)');
            llenar('filtroSucursal', makeOptions(visitasData.map(v => v.sucursal)), 'Sucursal (todas)');
            llenar('filtroZona',     makeOptions(visitasData.map(v => v.zona)),     'Zona (todas)');
            llenar('filtroCanal',    makeOptions(visitasData.map(v => v.canal)),    'Canal (todos)');
        }

        function applyFilters() {
            const fDesde   = document.getElementById('fechaDesde').value;
            const fHasta   = document.getElementById('fechaHasta').value;
            const fCliente = document.getElementById('filtroCliente').value;
            const fCad     = document.getElementById('filtroCadena').value;
            const fSuc     = document.getElementById('filtroSucursal').value;
            const fZona    = document.getElementById('filtroZona').value;
            const fCanal   = document.getElementById('filtroCanal').value;

            filteredVisitas = visitasData.filter(v => {
                if (fDesde  && new Date(v.fecha).setHours(0,0,0,0) < new Date(fDesde).setHours(0,0,0,0)) return false;
                if (fHasta  && new Date(v.fecha).setHours(0,0,0,0) > new Date(fHasta).setHours(0,0,0,0)) return false;
                if (fCliente && v.cliente !== fCliente) return false;
                if (fCad    && v.cadena !== fCad) return false;
                if (fSuc    && v.sucursal !== fSuc) return false;
                if (fZona   && v.zona !== fZona) return false;
                if (fCanal  && v.canal !== fCanal) return false;
                return true;
            });
            visitaIndex = 0;
            if (filteredVisitas.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay visitas que coincidan.</p>';
                const nav = document.getElementById('navVisitas');
                if (nav) nav.style.display = 'none';
                return;
            }
            renderVisita(visitaIndex);
        }

        function clearFilters() {
            ['fechaDesde','fechaHasta','filtroCliente','filtroCadena','filtroSucursal','filtroZona','filtroCanal']
                .forEach(id => document.getElementById(id).value = '');
            applyFilters();
        }

        // ── Lightbox ─────────────────────────────────────────────────────────
        const lightbox  = document.getElementById('lightbox');
        const lbImg     = document.getElementById('lightbox-img');
        const lbRotate  = document.getElementById('lightbox-rotate');
        const lbDownload = document.getElementById('lightbox-download');

        function openLightbox(index) {
            currentImg = index;
            const sourceImg = document.querySelectorAll('.img-preview')[index];
            lbImg.src = sourceImg.src;
            const rot = sourceImg.getAttribute('data-rotation') || 0;
            lbImg.style.transform = `rotate(${rot}deg) scale(${rot % 180 !== 0 ? 0.75 : 1})`;
            lbImg.setAttribute('data-rotation', rot);
            updateLightboxInfo();
            lightbox.classList.add('activo');
        }

        function updateLightboxInfo() {
            const v = filteredVisitas[visitaIndex];
            const el = document.getElementById('lightbox-info-content');
            if (v && el) el.innerHTML = `
                <span><i class="fas fa-building"></i> ${v.cadena}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${v.sucursal}</span>
                <span><i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}</span>`;
        }

        lbRotate.onclick = e => {
            e.stopPropagation();
            let rot = (parseInt(lbImg.getAttribute('data-rotation') || 0) + 90) % 360;
            lbImg.setAttribute('data-rotation', rot);
            lbImg.style.transform = `rotate(${rot}deg) scale(${rot % 180 !== 0 ? 0.75 : 1})`;
            const previews = document.querySelectorAll('.img-preview');
            if (previews[currentImg]) {
                previews[currentImg].setAttribute('data-rotation', rot);
                previews[currentImg].style.transform = `rotate(${rot}deg) ${rot % 180 !== 0 ? 'scale(0.8)' : ''}`;
            }
        };

        function changeImage(delta) {
            const v = filteredVisitas[visitaIndex];
            if (!v) return;
            if (delta > 0 && currentImg === v.imagenes.length - 1) {
                visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
                renderVisita(visitaIndex); currentImg = 0;
            } else if (delta < 0 && currentImg === 0) {
                visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
                renderVisita(visitaIndex); currentImg = filteredVisitas[visitaIndex].imagenes.length - 1;
            } else {
                currentImg = (currentImg + delta + v.imagenes.length) % v.imagenes.length;
            }
            setTimeout(() => {
                const previews = document.querySelectorAll('.img-preview');
                const src = previews[currentImg];
                if (!src) return;
                lbImg.src = src.src;
                const rot = parseInt(src.getAttribute('data-rotation') || 0);
                lbImg.setAttribute('data-rotation', rot);
                lbImg.style.transform = `rotate(${rot}deg) scale(${rot % 180 !== 0 ? 0.75 : 1})`;
                updateLightboxInfo();
            }, 0);
        }

        document.getElementById('lightbox-prev').onclick = e => { e.stopPropagation(); changeImage(-1); };
        document.getElementById('lightbox-next').onclick = e => { e.stopPropagation(); changeImage(1); };
        document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('activo');
        lightbox.onclick = e => { if (e.target === lightbox) lightbox.classList.remove('activo'); };
        if (lbDownload) lbDownload.onclick = e => {
            e.stopPropagation();
            const a = document.createElement('a'); a.href = lbImg.src; a.download = 'foto_solvens.jpg'; a.click();
        };

        document.getElementById('prevVisita').onclick = () => { visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length; renderVisita(visitaIndex); };
        document.getElementById('nextVisita').onclick = () => { visitaIndex = (visitaIndex + 1) % filteredVisitas.length; renderVisita(visitaIndex); };

        // ── PPTX (mismo estilo que vista_fotos_cliente) ──────────────────────
        async function imgUrlToBase64(url) {
            try {
                const res = await fetch(`/api/proxy-imagen?url=${encodeURIComponent(url)}`);
                if (!res.ok) return null;
                const blob = await res.blob();
                return await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch { return null; }
        }

        async function generarReportePPTX() {
            const btn = document.getElementById('btnExportarPPTX');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando...';
            btn.disabled = true;
            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                const slidePortada = pptx.addSlide();
                slidePortada.bkgd = { color: 'F5F5F5' };
                slidePortada.addShape(pptx.ShapeType.rect, { x:0, y:0, w:10, h:0.6, fill:{ color:'DC2626' } });

                const logoUrl = '/IMG/logo.png';
                const logoB64 = await imgUrlToBase64(logoUrl);
                let headerLogoW, headerLogoH;

                if (logoB64) {
                    const imgObj = new Image();
                    await new Promise(res => { imgObj.onload = res; imgObj.src = logoUrl; });
                    const ratio = imgObj.width / imgObj.height;
                    let cW = 3.5, cH = cW / ratio;
                    if (cH > 1.8) { cH = 1.8; cW = cH * ratio; }
                    slidePortada.addImage({ data: logoB64, x:(10-cW)/2, y:1.0, w:cW, h:cH, sizing:{type:'contain',w:cW,h:cH} });
                    headerLogoH = 0.45; headerLogoW = headerLogoH * ratio;
                    if (headerLogoW > 1.8) { headerLogoW = 1.8; headerLogoH = headerLogoW / ratio; }
                }

                slidePortada.addText('Reporte de Evidencia Fotográfica', { x:0, y:3.2, w:'100%', h:0.8, fontSize:32, color:'8B0000', bold:true, align:'center', fontFace:'Arial' });
                slidePortada.addText(`Exportado el: ${new Date().toLocaleDateString('es-AR')}`, { x:0, y:4.8, w:'100%', h:0.4, fontSize:12, color:'666666', align:'center' });

                for (const v of filteredVisitas) {
                    let imageChunks = [];
                    if (v.imagenes.length <= 3) imageChunks.push(v.imagenes);
                    else if (v.imagenes.length === 4) imageChunks.push(v.imagenes.slice(0,2), v.imagenes.slice(2,4));
                    else if (v.imagenes.length === 5) imageChunks.push(v.imagenes.slice(0,3), v.imagenes.slice(3,5));
                    else { for (let k=0; k<v.imagenes.length; k+=3) imageChunks.push(v.imagenes.slice(k,k+3)); }

                    for (let cIdx=0; cIdx<imageChunks.length; cIdx++) {
                        const imgs = imageChunks[cIdx];
                        const count = imgs.length;
                        const slide = pptx.addSlide();
                        slide.bkgd = { color: 'F9F9F9' };
                        slide.addShape(pptx.ShapeType.rect, { x:0, y:0, w:10, h:0.6, fill:{ color:'DC2626' } });

                        if (logoB64 && headerLogoW) {
                            slide.addImage({ data:logoB64, x:0.2, y:(0.6-headerLogoH)/2, w:headerLogoW, h:headerLogoH, sizing:{type:'contain',w:headerLogoW,h:headerLogoH} });
                        }

                        const fechaStr = new Date(v.fecha).toLocaleDateString('es-AR', { timeZone:'UTC' });
                        slide.addText(`${v.cliente} | ${v.cadena} | ${fechaStr}${imageChunks.length>1?` (Parte ${cIdx+1})`:''}`, { x:1.5, y:0.05, w:8.3, h:0.5, fontSize:11, color:'FFFFFF', align:'right', valign:'middle', bold:true });
                        slide.addText(`${v.sucursal} - ${v.localidad}`, { x:0.5, y:0.7, w:9, h:0.4, fontSize:18, color:'DC2626', bold:true });

                        const areaY=1.3, areaW=9, areaH=4.1, gutter=0.3;
                        let cW = (areaW-(count-1)*gutter)/count, startX=0.5;
                        if (count===1) { cW=5; startX=0.5+(areaW-cW)/2; }
                        else if (count===2) { cW=4; startX=0.5+(areaW-(cW*2+gutter))/2; }

                        for (let i=0; i<count; i++) {
                            const imgB64 = await imgUrlToBase64(imgs[i].ruta);
                            if (imgB64) slide.addImage({ data:imgB64, x:startX+i*(cW+gutter), y:areaY, sizing:{type:'contain',w:cW,h:areaH} });
                        }
                    }
                }

                await pptx.writeFile({ fileName: `Reporte_Supervisor_${new Date().toISOString().slice(0,10)}.pptx` });
            } catch (err) {
                console.error('Error al generar PPTX:', err);
                alert('Hubo un error al generar el PowerPoint.');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // ── Botones filtros ───────────────────────────────────────────────────
        document.getElementById('btnAplicarFiltros').onclick = applyFilters;
        document.getElementById('btnLimpiarFiltros').onclick = clearFilters;
        document.getElementById('btnExportarPPTX').onclick = generarReportePPTX;

        document.addEventListener('DOMContentLoaded', cargarVisitas);
    </script>

    <script src="js/filtros.js"></script>

</body>
</html>
