<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Visita - Solvens</title>
    <link rel="icon" href="../IMG/logo2.jpg" type="image/jpg">
    <link rel="stylesheet" href="style/carga_visitas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="header-left">
            <a href="inicioRepositor.html" class="btn-volver">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
            </a>
        </div>
        <div class="header-center">
            <img src="../IMG/logo.png" alt="Logo Grupo Solvens" class="logo-nav">
        </div>
        <div class="header-right">
            <a href="login.html" class="btn-salir">Cerrar Sesión</a>
        </div>
    </header>

    <div class="contenedor">
        <h1 class="page-titulo">Carga de <span>Visita</span></h1>
        
        <form id="visitaForm">

            <!-- ── SECCIÓN CLIENTE / SUCURSAL ── -->
            <div class="seccion">
                <p class="seccion-titulo">Datos de la Visita</p>
                <div class="select-wrapper">
                    <select id="cliente" required>
                        <option value="" disabled selected>Seleccione Cliente</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="cadena" required disabled>
                        <option value="" disabled selected>Seleccione Cadena</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="sucursal" required disabled>
                        <option value="" disabled selected>Seleccione Sucursal</option>
                    </select>
                </div>
            </div>
            <!-- ── SECCIÓN PRODUCTOS (COMENTADA) ──
            <div class="seccion" id="seccionProductos" style="display:none;">
                <p class="seccion-titulo">Productos <span
                        style="color:#555;font-weight:400;font-size:12px;text-transform:none;letter-spacing:0;">(opcional)</span>
                </p>
                <div class="buscador-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="buscarProducto" placeholder="Buscar producto por nombre...">
                </div>
                <div id="listaProductos"></div>
            </div>
            -->

            <!-- ── SECCIÓN FOTOS ── -->
            <div class="seccion">
                <p class="seccion-titulo">Evidencia Fotográfica</p>
                <div class="file-wrapper">
                    <label class="file-label" for="fotos">
                        <i class="fas fa-camera"></i>
                        <span id="labelFotos">Seleccionar fotos (máx. 3)</span>
                    </label>
                    <input type="file" id="fotos" accept="image/*" multiple>
                    <div id="previewFotos" class="preview-fotos"></div>
                </div>
                
            </div>

            <div class="indicacion-final elegante">
                <div class="icono-advertencia">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <div class="texto-indicacion">
                    <p class="indicacion-titulo">Paso final</p>
                    <p class="indicacion-descripcion">
                        Para completar la carga de la visita, debe presionar el botón
                        <span class="accion-final">Registrar Visita</span>
                    </p>
                </div>
            </div>

            <button type="submit" class="btn-registrar">
                <i class="fas fa-paper-plane icono-btn"></i>Registrar Visita
            </button>

        </form>
    </div>

    <!-- ── TOAST ÉXITO ── -->
    <div id="toast-exito" class="toast-exito">
        <i class="fas fa-check-circle"></i>
        <span>Registro exitoso</span>
    </div>

    <!-- ── TOAST FOTOS ── -->
    <div id="toast-fotos" class="toast-exito">
        <i class="fas fa-images icono-fotos-toast"></i>
        <span id="toast-fotos-texto"></span>
    </div>

    <!-- ── TOAST ERROR ── -->
    <div id="toast-error" class="toast-exito toast-error-custom">
        <i class="fas fa-exclamation-circle"></i>
        <span id="toast-error-texto"></span>
    </div>

    <script>
        // --- ESTADO ---
        let productosOriginales = [];
        let datosIngresados = {};
        let todasLasSucursales = []; // lista completa luego de cargar cliente

        // --- DOM ---
        const clienteSel  = document.getElementById('cliente');
        const cadenaSel   = document.getElementById('cadena');
        const sucursalSel = document.getElementById('sucursal');
        const inputFotos  = document.getElementById('fotos');
        const labelFotos  = document.getElementById('labelFotos');

        // ID del repositor logueado — fuente de verdad para el filtro de zona
        const idRepo = localStorage.getItem('id_usuario');

        /* 
        const buscarInput = document.getElementById('buscarProducto');
        const prodContenedor = document.getElementById('listaProductos');
        const seccionProd = document.getElementById('seccionProductos');
        */

        // ── HELPERS ──────────────────────────────────────────────────────────────

        function poblarCadenas(sucursales) {
            const cadenas = [...new Map(sucursales.map(s => [s.Cadena, s.Cadena])).values()].sort();
            cadenaSel.innerHTML = '<option value="" disabled selected>Seleccione Cadena</option>';
            cadenas.forEach(c => {
                cadenaSel.innerHTML += `<option value="${c}">${c}</option>`;
            });
            cadenaSel.disabled = cadenas.length === 0;
        }

        function poblarSucursales(cadena) {
            const filtradas = todasLasSucursales.filter(s => s.Cadena === cadena);
            sucursalSel.innerHTML = '<option value="" disabled selected>Seleccione Sucursal</option>';
            filtradas.forEach(s => {
                const altura = s.Altura ? ` ${s.Altura}` : '';
                sucursalSel.innerHTML += `<option value="${s.ID}">${s.Calle}${altura} — ${s.Localidad}</option>`;
            });
            sucursalSel.disabled = filtradas.length === 0;
            if (filtradas.length === 0) {
                sucursalSel.innerHTML = '<option value="" disabled selected>Sin sucursales en tu zona</option>';
            }
        }

        // 1. CLIENTES
        fetch('/api/clientes-activos')
            .then(r => r.json())
            .then(data => {
                data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.ID;
                    opt.textContent = c.Nombre;
                    clienteSel.appendChild(opt);
                });

                // Preseleccionar cliente si viene del localStorage
                const idCliGuardado = localStorage.getItem('id_cliente_sel');
                if (idCliGuardado) {
                    clienteSel.value = idCliGuardado;
                    if (clienteSel.value) clienteSel.dispatchEvent(new Event('change'));
                }
            })
            .catch(err => console.error('Error al cargar clientes:', err));

        // 2. CAMBIO DE CLIENTE
        // Se pasa id_repo para que el backend filtre sucursales por zona del repositor.
        // El backend ignora cualquier intento de manipular este valor porque lo lee
        // directamente de la base de datos usando el id_repo como clave.
        clienteSel.addEventListener('change', async () => {
            const idCli = clienteSel.value;
            datosIngresados = {};
            todasLasSucursales = [];

            // Resetear cadena y sucursal
            cadenaSel.innerHTML = '<option value="" disabled selected>Seleccione Cadena</option>';
            cadenaSel.disabled = true;
            sucursalSel.innerHTML = '<option value="" disabled selected>Seleccione Sucursal</option>';
            sucursalSel.disabled = true;

            if (!idRepo) {
                mostrarToastError('Sesión expirada. Por favor volvé a iniciar sesión.');
                return;
            }

            const resS = await fetch(`/api/mis-sucursales?id_cliente=${idCli}&id_repo=${idRepo}`);

            if (!resS.ok) {
                const err = await resS.json();
                mostrarToastError(err.error || 'No se pudieron cargar las sucursales.');
                return;
            }

            const sucursales = await resS.json();
            todasLasSucursales = sucursales;

            if (sucursales.length === 0) {
                cadenaSel.innerHTML = '<option value="" disabled selected>Sin cadenas en tu zona</option>';
                return;
            }

            poblarCadenas(sucursales);

            // Preseleccionar cadena si viene del localStorage
            const cadenaGuardada = localStorage.getItem('cadena_sel');
            if (cadenaGuardada) {
                cadenaSel.value = cadenaGuardada;
                if (cadenaSel.value) cadenaSel.dispatchEvent(new Event('change'));
            }

            /*
            const resP = await fetch(`/api/productos-cliente?id_cliente=${idCli}`);
            productosOriginales = await resP.json();
            seccionProd.style.display = 'block';
            renderizar(productosOriginales);
            */
        });

        // 3. CAMBIO DE CADENA
        cadenaSel.addEventListener('change', () => {
            poblarSucursales(cadenaSel.value);

            // Preseleccionar sucursal si viene del localStorage
            const sucGuardada = localStorage.getItem('sucursal_sel');
            if (sucGuardada) {
                sucursalSel.value = sucGuardada;
            }
        });

        // 3. RENDERIZADO
        /*
        function renderizar(lista) {
            prodContenedor.innerHTML = '';
            if (lista.length === 0) {
                prodContenedor.innerHTML = '<p class="prod-vacio">No se encontraron productos.</p>';
                return;
            }
            lista.forEach(p => {
                const guardado = datosIngresados[p.ID] || { precio: '', oferta: false };
                const div = document.createElement('div');
                div.className = 'prod-item';
                div.innerHTML = `
                    <span class="prod-nombre">${p.Descripcion}</span>
                    <div class="prod-controles">
                        <input type="number" step="0.01" min="0" class="precio-input"
                               placeholder="$ —" value="${guardado.precio}"
                               oninput="guardarProgreso(${p.ID}, this.value, null)">
                        <label class="label-oferta">
                            <input type="checkbox" ${guardado.oferta ? 'checked' : ''}
                                   onchange="guardarProgreso(${p.ID}, null, this.checked)">
                            Oferta
                        </label>
                    </div>`;
                prodContenedor.appendChild(div);
            });
        }

        window.guardarProgreso = (id, precio, oferta) => {
            if (!datosIngresados[id]) datosIngresados[id] = { precio: '', oferta: false };
            if (precio !== null) datosIngresados[id].precio = precio;
            if (oferta !== null) datosIngresados[id].oferta = oferta;
        };

        buscarInput.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderizar(productosOriginales.filter(p => p.Descripcion.toLowerCase().includes(q)));
        });
        */

        // 6. FOTOS
        inputFotos.addEventListener('change', function () {
            const previewContenedor = document.getElementById('previewFotos');

            if (this.files.length > 3) {
                this.value = '';
                labelFotos.textContent = 'Seleccionar fotos (máx. 3)';
                previewContenedor.innerHTML = '';
                mostrarToastFotos('Límite superado: solo se permiten 3 fotos');
                return;
            }

            const cant = this.files.length;
            labelFotos.textContent = cant > 0
                ? `${cant} foto${cant > 1 ? 's' : ''} seleccionada${cant > 1 ? 's' : ''}`
                : 'Seleccionar fotos (máx. 3)';

            previewContenedor.innerHTML = '';
            Array.from(this.files).forEach(file => {
                const url = URL.createObjectURL(file);
                const img = document.createElement('img');
                img.src = url;
                img.className = 'preview-img';
                img.onload = () => URL.revokeObjectURL(url);
                previewContenedor.appendChild(img);
            });

            if (cant === 3) {
                mostrarToastFotos('3 de 3 fotos cargadas — límite alcanzado');
            } else if (cant > 0) {
                mostrarToastFotos(`${cant} de 3 foto${cant > 1 ? 's' : ''} cargada${cant > 1 ? 's' : ''}`);
            }
        });

        // 7. SUBMIT
        document.getElementById('visitaForm').addEventListener('submit', async e => {
            e.preventDefault();

            if (!clienteSel.value) { mostrarToastError('Seleccioná un cliente.'); return; }
            if (!sucursalSel.value) { mostrarToastError('Seleccioná una sucursal.'); return; }

            const archivos = inputFotos.files;
            for (let i = 0; i < archivos.length; i++) {
                if (archivos[i].size > 2 * 1024 * 1024) {
                    mostrarToastError(`La foto "${archivos[i].name}" supera el límite de 2MB.`);
                    return;
                }
            }

            /*
            const productosParaEnviar = Object.keys(datosIngresados)
                .filter(id => datosIngresados[id].precio !== '' && parseFloat(datosIngresados[id].precio) > 0)
                .map(id => ({
                    id_prod: parseInt(id),
                    precio: parseFloat(datosIngresados[id].precio),
                    oferta: datosIngresados[id].oferta
                }));
            */

            const productosParaEnviar = [];

            if (archivos.length === 0) {
                mostrarToastError('Cargá al menos una foto.');
                return;
            }

            if (!idRepo) { mostrarToastError('Sesión expirada.'); return; }

            const formData = new FormData();
            formData.append('id_repo', idRepo);
            formData.append('id_cliente', clienteSel.value);
            formData.append('id_sucursal', sucursalSel.value);
            formData.append('productos', JSON.stringify(productosParaEnviar));

            for (let i = 0; i < archivos.length; i++) {
                formData.append('imagenes', archivos[i]);
            }

            try {
                const res = await fetch('/api/cargar-visita', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    mostrarToast();
                    setTimeout(() => {
                        window.location.href = 'inicioRepositor.html';
                    }, 1600);
                } else {
                    mostrarToastError('Error: ' + (data.error || data.message));
                }
            } catch {
                mostrarToastError('Error de conexión con el servidor.');
            }
        });

        // ── TOAST ÉXITO ──
        function mostrarToast() {
            const toast = document.getElementById('toast-exito');
            toast.classList.add('activo');
            setTimeout(() => toast.classList.remove('activo'), 1400);
        }

        // ── TOAST FOTOS ──
        function mostrarToastFotos(mensaje) {
            const toast = document.getElementById('toast-fotos');
            document.getElementById('toast-fotos-texto').textContent = mensaje;
            toast.classList.add('activo');
            setTimeout(() => toast.classList.remove('activo'), 2500);
        }

        // ── TOAST ERROR ──
        function mostrarToastError(mensaje) {
            const toast = document.getElementById('toast-error');
            document.getElementById('toast-error-texto').textContent = mensaje;
            toast.classList.add('activo');
            setTimeout(() => toast.classList.remove('activo'), 3500);
        }
    </script>

</body>

</html>
