<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Evidencia de Visita</title>
    <link rel="icon" href="../IMG/logo2.jpg" type="image/jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/filtros.css">
    <link rel="stylesheet" href="style/vista_fotos.css">
    <link rel="stylesheet" href="style/inicio.css"></head>

<body>

    <header class="header">
        <div class="header-left">
            <a href="Admin_gestion_visitas.html" class="btn-volver" title="Volver a Gestión">
                <i class="fas fa-arrow-left"></i>
            </a>
            <button class="btn-toggle-sidebar btn-toggle-fotos" id="btnToggleSidebar">
                <i class="fas fa-filter"></i>
                <span>Filtros</span>
            </button>
        </div>
        <div class="header-center">
            <img src="../IMG/logo.png" alt="Logo Grupo Solvens" class="logo-nav">
        </div>
        <div class="header-right">
            <a href="login.html" class="btn-salir">Cerrar Sesión</a>
        </div>
    </header>

    <main class="contenido">
        <h1>Evidencia <span>Fotográfica</span></h1>
        <p class="page-subtitulo">Aprobación y registro visual de visitas</p>

        <div class="contenedor-layout">
            <aside class="sidebar-filtros" id="sidebarFiltros">
                <div class="sidebar-header">
                    <h2 class="titulo-filtros">Filtros</h2>
                    <button class="btn-cerrar-sidebar" id="btnCerrarSidebar"><i class="fas fa-times"></i></button>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Periodo</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione un rango de fechas:</p>
                        <div class="rango-fechas">
                            <div><label class="label-pequeno">Desde:</label><input type="date" class="input-fecha"
                                    id="fechaDesde"></div>
                            <div><label class="label-pequeno">Hasta:</label><input type="date" class="input-fecha"
                                    id="fechaHasta"></div>
                        </div>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Cadenas</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la cadena:</p>
                        <select class="select-filtro" id="filtroCadena">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Bocas</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la sucursal:</p>
                        <select class="select-filtro" id="filtroSucursal">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Región</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la región (zona):</p>
                        <select class="select-filtro" id="filtroZona">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Clientes</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione el cliente:</p>
                        <select class="select-filtro" id="filtroCliente">
                            <option value="">Todos</option>
                        </select>
                    </div>
                </div>

                <div class="botones-filtro">
                    <button class="btn-aplicar-filtros" id="btnAplicarFiltros">Aplicar Filtros</button>
                    <button class="btn-limpiar-filtros" id="btnLimpiarFiltros">Limpiar Filtros</button>
                </div>
            </aside>

            <div id="contenedorVisitas" class="contenedor-visitas-full"></div>
        </div>
    </main>

    <div class="nav-container" id="navVisitas" style="display: none;">
        <button class="btn-nav-visita" id="prevVisita" title="Visita Anterior">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="btn-nav-visita" id="nextVisita" title="Siguiente Visita">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <footer class="footer-contacto">
        <p><i class="fa-solid fa-envelope"></i> <a href="mailto:NRossi@gruposolvens.com.ar">NRossi@gruposolvens.com.ar</a> | <i class="fa-solid fa-phone"></i> +54 11 6142-0293</p>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-prev" id="lightbox-prev" title="Imagen anterior">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="lightbox-next" id="lightbox-next" title="Siguiente imagen">
            <i class="fas fa-chevron-right"></i>
        </button>

        <div class="lightbox-controls">
            <button class="btn-control" id="lightbox-download" title="Descargar">
                <i class="fas fa-download"></i>
            </button>
            <button class="btn-control" id="lightbox-close" title="Cerrar">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <img class="lightbox-img" id="lightbox-img" src="" alt="">

        <div class="lightbox-info">
            <div id="lightbox-info-content" style="display:contents;"></div>

            <div class="admin-lightbox-actions">
                <button class="btn-admin-lb aprobar" id="lightbox-aprobar" title="Aprobar Foto">
                    <i class="fas fa-check"></i> <span>Aprobar</span>
                </button>
                <button class="btn-admin-lb rechazar" id="lightbox-rechazar" title="Rechazar Foto">
                    <i class="fas fa-times"></i> <span>Rechazar</span>
                </button>
            </div>

            <button class="btn-control-inline" id="lightbox-rotate" title="Rotar">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const URL_BASE = '/api';

        let visitasData = [];
        let filteredVisitas = [];
        let visitaIndex = 0;
        let currentImg = 0;
        let currentLightboxImgId = null;

        async function cargarVisitasAdmin() {
            const tipo = Number(localStorage.getItem('tipoUsuario'));
            if (tipo !== 1) {
                window.location.href = 'login.html';
                return;
            }
            const res = await fetch(`${URL_BASE}/imagenes-visitas`);
            if (!res.ok) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>Error al obtener las imágenes.</p>';
                return;
            }
            visitasData = await res.json();
            visitasData.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            if (visitasData.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay imágenes cargadas.</p>';
                return;
            }
            populateFilters();
            clearFilters();
        }

        function renderVisita(idx) {
            const v = filteredVisitas[idx];
            const cont = document.getElementById('contenedorVisitas');

            const imgsHtml = v.imagenes.map((img, i) => {
                const est = img.estado || 'Pendiente';
                const estClass = est.toLowerCase();
                return `
                <div class="foto-card" onclick="openLightbox(${i})">
                    <span class="status-pill status-${estClass}">${est}</span>
                    <div class="foto-wrapper">
                        <img src="${img.ruta}" alt="Foto ${i + 1}" data-id="${img.id}" data-rotation="0" class="img-preview">
                    </div>
                    <button class="btn-rotar-gallery" onclick="rotarImagenGaleria(this, event)" title="Rotar vista">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <div class="img-actions-overlay">
                        <button class="btn-mini-accion aprobar" onclick="actualizarEstadoImagen(${img.id}, 'Aprobado', event)" title="Aprobar">
                            <i class="fas fa-check"></i>
                        </button>
                        <button class="btn-mini-accion rechazar" onclick="actualizarEstadoImagen(${img.id}, 'Rechazado', event)" title="Rechazar">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');

            cont.innerHTML = `
                <div class="visita-seccion">
                    <div class="visita-header">
                        <h1>${v.cadena}</h1>
                        <div class="sub">
                            <span><i class="fas fa-user-check"></i> ${v.cliente}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${v.sucursal} - ${v.localidad}</span>
                            <span><i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}</span>
                            <span><i class="fas fa-user"></i> ${v.repositor}</span>
                        </div>
                    </div>
                    <div class="galeria-grid">
                        ${imgsHtml}
                    </div>
                </div>`;

            const nav = document.getElementById('navVisitas');
            if (nav) nav.style.display = filteredVisitas.length > 1 ? 'flex' : 'none';
        }

        function rotarImagenGaleria(btn, e) {
            e.stopPropagation();
            const img = btn.parentElement.querySelector('img');
            let rot = (parseInt(img.getAttribute('data-rotation')) + 90) % 360;
            img.setAttribute('data-rotation', rot);
            img.style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
        }

        function openLightbox(index) {
            currentImg = index;
            const previews = document.querySelectorAll('.img-preview');
            const sourceImg = previews[index];
            currentLightboxImgId = sourceImg.dataset.id;

            lbImg.src = sourceImg.src;

            const rot = parseInt(sourceImg.getAttribute('data-rotation') || 0);
            lbImg.setAttribute('data-rotation', rot);
            const scale = (rot % 180 !== 0) ? 0.75 : 1;
            lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;

            updateLightboxInfo();
            lightbox.classList.add('activo');
        }

        function updateLightboxInfo() {
            const v = filteredVisitas[visitaIndex];
            const metaEl = document.getElementById('lightbox-info-content');

            // Buscar estado actual en visitasData
            let estado = 'Pendiente';
            visitasData.forEach(vis => {
                vis.imagenes.forEach(img => {
                    if (img.id == currentLightboxImgId) estado = img.estado || 'Pendiente';
                });
            });
            const estClass = estado.toLowerCase();

            if (v && metaEl) {
                metaEl.innerHTML = `
                    <span><i class="fas fa-building"></i> <strong>${v.cadena}</strong></span>
                    <span><i class="fas fa-map-marker-alt"></i> ${v.sucursal}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}</span>
                    <span class="status-badge-lb status-${estClass}">${estado}</span>
                `;
            }
        }

        function changeImage(delta) {
            const v = filteredVisitas[visitaIndex];
            if (!v || !v.imagenes) return;

            if (delta > 0 && currentImg === v.imagenes.length - 1) {
                visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
                renderVisita(visitaIndex);
                currentImg = 0;
            } else if (delta < 0 && currentImg === 0) {
                visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
                renderVisita(visitaIndex);
                currentImg = filteredVisitas[visitaIndex].imagenes.length - 1;
            } else {
                currentImg = (currentImg + delta + v.imagenes.length) % v.imagenes.length;
            }

            setTimeout(() => {
                const previews = document.querySelectorAll('.img-preview');
                const sourceImg = previews[currentImg];
                if (!sourceImg) return;
                currentLightboxImgId = sourceImg.dataset.id;

                lbImg.src = sourceImg.src;
                const rot = parseInt(sourceImg.getAttribute('data-rotation') || 0);
                lbImg.setAttribute('data-rotation', rot);
                const scale = (rot % 180 !== 0) ? 0.75 : 1;
                lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;
                updateLightboxInfo();
            }, 0);
        }

        const lbImg = document.getElementById('lightbox-img');
        const lbRotate = document.getElementById('lightbox-rotate');
        const lightbox = document.getElementById('lightbox');

        lbRotate.onclick = (e) => {
            e.stopPropagation();
            let rot = (parseInt(lbImg.getAttribute('data-rotation') || 0) + 90) % 360;
            lbImg.setAttribute('data-rotation', rot);
            const scale = (rot % 180 !== 0) ? 0.75 : 1;
            lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;

            const previews = document.querySelectorAll('.img-preview');
            const target = Array.from(previews).find(p => p.dataset.id == currentLightboxImgId);
            if (target) {
                target.setAttribute('data-rotation', rot);
                target.style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
            }
        };

        document.getElementById('lightbox-prev').onclick = (e) => { e.stopPropagation(); changeImage(-1); };
        document.getElementById('lightbox-next').onclick = (e) => { e.stopPropagation(); changeImage(1); };
        document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('activo');
        lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('activo'); };

        async function actualizarEstadoImagen(idImg, nuevoEstado, e) {
            if (e) e.stopPropagation();
            
            let rot = 0;
            const targetInfo = Array.from(document.querySelectorAll('.img-preview')).find(p => p.dataset.id == idImg);
            if (targetInfo) rot = parseInt(targetInfo.getAttribute('data-rotation') || 0);

            try {
                // Notificar guardado
                const btnIcon = e ? e.currentTarget : null;
                if (btnIcon && btnIcon.tagName === 'BUTTON') {
                    btnIcon.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                }

                const res = await fetch(`${URL_BASE}/imagen/${idImg}/estado`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado, rotacion: rot })
                });
                if (res.ok) {
                    mostrarToast(`Imagen ${nuevoEstado.toLowerCase()} correctamente.`);
                    // Actualizar localmente sin recargar todo si es posible
                    visitasData.forEach(vis => {
                        vis.imagenes.forEach(img => {
                            if (img.id == idImg) img.estado = nuevoEstado;
                        });
                    });
                    renderVisita(visitaIndex);
                    if (lightbox.classList.contains('activo')) updateLightboxInfo();
                } else mostrarToast('Error al actualizar.', 'error');
            } catch (err) {
                mostrarToast('Error de conexión.', 'error');
            }
        }

        function mostrarToast(mensaje, tipo = 'exito') {
            const t = document.getElementById('toast');
            t.textContent = mensaje;
            t.className = `toast ${tipo} visible`;
            setTimeout(() => t.classList.remove('visible'), 3000);
        }

        document.getElementById('lightbox-aprobar').onclick = () => {
            if (currentLightboxImgId) actualizarEstadoImagen(currentLightboxImgId, 'Aprobado');
        };
        document.getElementById('lightbox-rechazar').onclick = () => {
            if (currentLightboxImgId) actualizarEstadoImagen(currentLightboxImgId, 'Rechazado');
        };

        document.getElementById('prevVisita').onclick = () => {
            visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };
        document.getElementById('nextVisita').onclick = () => {
            visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };

        function populateFilters() {
            const makeOptions = (arr) => [...new Set(arr)].sort();
            const llenar = (id, items, prefix) => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">${prefix}</option>` +
                    items.map(x => `<option value="${x}">${x}</option>`).join('');
            };
            llenar('filtroCliente', makeOptions(visitasData.map(v => v.cliente)), 'Cliente (todos)');
            llenar('filtroCadena', makeOptions(visitasData.map(v => v.cadena)), 'Cadena (todas)');
            llenar('filtroSucursal', makeOptions(visitasData.map(v => v.sucursal)), 'Sucursal (todas)');
            llenar('filtroZona', makeOptions(visitasData.map(v => v.zona)), 'Zona (todas)');
        }

        function applyFilters() {
            const fDesde = document.getElementById('fechaDesde').value;
            const fHasta = document.getElementById('fechaHasta').value;
            const fC = document.getElementById('filtroCliente').value;
            const fCad = document.getElementById('filtroCadena').value;
            const fSuc = document.getElementById('filtroSucursal').value;
            const fZona = document.getElementById('filtroZona').value;

            filteredVisitas = visitasData.filter(v => {
                if (fDesde && new Date(v.fecha) < new Date(fDesde)) return false;
                if (fHasta && new Date(v.fecha) > new Date(fHasta)) return false;
                if (fC && v.cliente !== fC) return false;
                if (fCad && v.cadena !== fCad) return false;
                if (fSuc && v.sucursal !== fSuc) return false;
                if (fZona && v.zona !== fZona) return false;
                return true;
            });
            visitaIndex = 0;
            if (filteredVisitas.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p class="no-results">No hay visitas que coincidan con los filtros.</p>';
                document.getElementById('navVisitas').style.display = 'none';
                return;
            }
            renderVisita(0);
        }

        function clearFilters() {
            ['fechaDesde', 'fechaHasta', 'filtroCliente', 'filtroCadena', 'filtroSucursal', 'filtroZona']
                .forEach(id => document.getElementById(id).value = '');
            applyFilters();
        }

        document.getElementById('btnAplicarFiltros').onclick = applyFilters;
        document.getElementById('btnLimpiarFiltros').onclick = clearFilters;

        document.getElementById('btnToggleSidebar').onclick = () => { document.getElementById('sidebarFiltros').classList.add('activo'); document.getElementById('btnToggleSidebar').classList.add('oculto'); };
        document.getElementById('btnCerrarSidebar').onclick = () => { document.getElementById('sidebarFiltros').classList.remove('activo'); document.getElementById('btnToggleSidebar').classList.remove('oculto'); };

        // Grupos colapsables
        document.querySelectorAll('.filtro-header').forEach(header => {
            header.addEventListener('click', () => {
                const grupo = header.parentElement;
                const contenido = header.nextElementSibling;
                const icono = header.querySelector('.icono-toggle');
                grupo.classList.toggle('colapsado');
                if (grupo.classList.contains('colapsado')) {
                    contenido.style.maxHeight = '0';
                    icono.style.transform = 'rotate(-90deg)';
                } else {
                    contenido.style.maxHeight = contenido.scrollHeight + 'px';
                    icono.style.transform = 'rotate(0deg)';
                }
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Inicializar grupos colapsados
            document.querySelectorAll('.grupo-filtro').forEach(g => {
                g.classList.add('colapsado');
                g.querySelector('.filtro-contenido').style.maxHeight = '0';
                g.querySelector('.icono-toggle').style.transform = 'rotate(-90deg)';
            });
            cargarVisitasAdmin();
        });
    </script>
</body>

</html>
